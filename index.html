<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Domain Watcher CRUD</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { padding: 5px; margin-right: 5px; }
    button { margin-left: 5px; }
    li { margin-bottom: 5px; }
  </style>
</head>
<body>
<h2>Domain Watcher</h2>

<input id="domainInput" placeholder="example.com">
<button onclick="addDomain()">Add Domain</button>

<h3>Domains:</h3>
<ul id="domainList"></ul>

<script>
let domains = [];

// Load domains from local domains.json in the same repo
async function loadDomains() {
  try {
    const res = await fetch("domains.json"); // local file
    if (!res.ok) throw new Error("Failed to load domains.json");
    domains = await res.json(); // JSON array directly
    renderList();
  } catch (err) {
    alert(err.message);
    console.error(err);
  }
}

// Render the domain list
function renderList() {
  const ul = document.getElementById("domainList");
  ul.innerHTML = "";
  domains.forEach((d, i) => {
    const li = document.createElement("li");
    li.textContent = `${d.name} (${d.expiry || "no expiry"})`;

    const editBtn = document.createElement("button");
    editBtn.textContent = "Edit";
    editBtn.onclick = () => editDomain(i);
    li.appendChild(editBtn);

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.onclick = () => deleteDomain(i);
    li.appendChild(delBtn);

    ul.appendChild(li);
  });
}

// Add a new domain (in-memory)
function addDomain() {
  const input = document.getElementById("domainInput");
  const name = input.value.trim();
  if (!name || domains.find(d => d.name === name)) return;
  domains.push({ name });
  input.value = "";
  renderList();
}

// Edit a domain (in-memory)
function editDomain(index) {
  const newName = prompt("Edit domain name:", domains[index].name);
  if (!newName) return;
  domains[index].name = newName.trim();
  renderList();
}

// Delete a domain (in-memory)
function deleteDomain(index) {
  if (confirm(`Delete ${domains[index].name}?`)) {
    domains.splice(index, 1);
    renderList();
  }
}

// Initialize
loadDomains();
</script>
</body>
</html>
